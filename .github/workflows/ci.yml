name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CybersecurityChatbot/CybersecurityChatbot.csproj

      - name: Build
        run: dotnet build CybersecurityChatbot/CybersecurityChatbot.csproj --no-restore --configuration Release